name: Download and Upload via Git

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the file to download'
        required: true
      file_path:
        description: 'Path in repo (e.g., folder/file.exe)'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    
    # Required to allow the Action to push to the repo
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download file
        run: |
          # Create the target directory if it doesn't exist
          mkdir -p "$(dirname "${{ github.event.inputs.file_path }}")"
          
          # Download directly to the target path
          curl -L "${{ github.event.inputs.file_url }}" -o "${{ github.event.inputs.file_path }}"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add "${{ github.event.inputs.file_path }}"
          
          # Commit only if there are changes
          git commit -m "Add/Update ${{ github.event.inputs.file_path }} from URL" || exit 0
          
          git push
