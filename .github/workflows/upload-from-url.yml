name: Download and Upload via API

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the file to download'
        required: true
      file_path:
        description: 'Path in repo (e.g., folder/file.exe)'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download file
        run: |
          curl -L "${{ github.event.inputs.file_url }}" -o file.bin

      - name: Upload to GitHub using REST API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Convert file to base64 (required by GitHub API)
          CONTENT_BASE64=$(base64 -w 0 file.bin)

          # API endpoint for the file
          API_URL="https://api.github.com/repos/${{ github.repository }}/contents/${{ github.event.inputs.file_path }}"

          # Check if file exists to get its SHA (required for updates)
          SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL" | jq -r '.sha // ""')

          # Build JSON payload
          if [ -z "$SHA" ]; then
            JSON=$(jq -n \
              --arg message "Add file from URL" \
              --arg content "$CONTENT_BASE64" \
              --arg branch "${{ github.ref_name }}" \
              '{message: $message, content: $content, branch: $branch}')
          else
            JSON=$(jq -n \
              --arg message "Update file from URL" \
              --arg content "$CONTENT_BASE64" \
              --arg sha "$SHA" \
              --arg branch "${{ github.ref_name }}" \
              '{message: $message, content: $content, sha: $sha, branch: $branch}')
          fi

          # Upload the file
          curl -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$JSON" \
            "$API_URL"
