name: Download and Upload via Python

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the file to download'
        required: true
      file_path:
        description: 'Path in repo (e.g., folder/file.exe)'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (to get branch context)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download and upload via Python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import base64
          import requests
          import sys

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["GITHUB_REF_NAME"]
          file_url = "${{ github.event.inputs.file_url }}"
          file_path = "${{ github.event.inputs.file_path }}"

          # Download the file
          print(f"Downloading {file_url} ...")
          r = requests.get(file_url)
          r.raise_for_status()
          content = r.content
          content_base64 = base64.b64encode(content).decode("utf-8")

          # GitHub API URL for the file
          api_url = f"https://api.github.com/repos/{repo}/contents/{file_path}"

          # Check if file exists to get SHA
          headers = {"Authorization": f"token {token}"}
          resp = requests.get(api_url, headers=headers)
          sha = resp.json().get("sha") if resp.status_code == 200 else None

          # Prepare payload
          payload = {
              "message": f"Add/update {file_path}",
              "content": content_base64,
              "branch": branch,
          }
          if sha:
              payload["sha"] = sha

          # Upload the file
          print(f"Uploading to {file_path} ...")
          resp = requests.put(api_url, headers=headers, json=payload)
          resp.raise_for_status()
          print("Success!")
          EOF
