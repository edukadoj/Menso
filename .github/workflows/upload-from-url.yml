name: Download and Upload via Git

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the file to download'
        required: true
        default: 'https://download.visualstudio.microsoft.com/download/pr/7f4d5cbc-4449-4ea5-9578-c467821f251f/b9b19f89d0642bf78f4b612c6a741637/dotnet-runtime-8.0.0-win-x64.exe'
      file_path:
        description: 'Path in repo (e.g., folder/file.exe) - USE FORWARD SLASHES'
        required: true

env:
  # This hides the Node.js 20 warning you saw
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download file
        run: |
          echo "Target path: ${{ github.event.inputs.file_path }}"
          
          # Create directory
          mkdir -p "$(dirname "${{ github.event.inputs.file_path }}")"
          
          # Download file
          curl -L -f "${{ github.event.inputs.file_url }}" -o "${{ github.event.inputs.file_path }}"
          
          # Verify file exists and check its size
          ls -la "${{ github.event.inputs.file_path }}"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add "${{ github.event.inputs.file_path }}"
          
          # Check git status
          git status
          
          # Commit only if there are changes
          git commit -m "Add/Update ${{ github.event.inputs.file_path }} from URL" || exit 0
          
          # Push to the branch that triggered the workflow
          git push origin HEAD
